<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
      --text: #e6edf3; --text2: #8b949e; --accent: #2ecc87; --accent2: #27ae60;
      --danger: #f85149; --radius: 10px; --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }
    button { font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
    input, textarea, select {
      font:inherit; background:var(--bg3); color:var(--text); border:1px solid var(--border);
      border-radius:var(--radius); padding:10px 14px; width:100%; outline:none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus, select:focus { border-color:var(--accent); }
    textarea { min-height:80px; resize:vertical; }
    label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; font-family:var(--mono); text-transform:uppercase; letter-spacing:.5px; }
    .field { margin-bottom:14px; }

    /* Login */
    #login {
      display:flex; justify-content:center; align-items:center; min-height:100vh;
      background:radial-gradient(circle at 50% 0%, hsla(155,50%,30%,.08), transparent 60%);
    }
    .login-card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:40px 32px; width:100%; max-width:400px; text-align:center; }
    .login-card h1 { font-size:20px; margin-bottom:6px; }
    .login-card p { font-size:13px; color:var(--text2); margin-bottom:24px; }
    .login-card .field { text-align:left; }
    .login-card .error { color:var(--danger); font-size:12px; margin-top:8px; min-height:18px; }

    /* Panel */
    #panel { display:none; }
    .panel-header {
      position:sticky; top:0; z-index:10; background:var(--bg2); border-bottom:1px solid var(--border);
      padding:12px 24px; display:flex; justify-content:space-between; align-items:center;
    }
    .panel-header h1 { font-size:16px; font-family:var(--mono); }
    .panel-header h1 span { color:var(--accent); }
    .panel-body { display:flex; min-height:calc(100vh - 53px); }

    /* Sidebar nav */
    .admin-nav {
      width:220px; background:var(--bg2); border-right:1px solid var(--border);
      padding:16px 0; flex-shrink:0; position:sticky; top:53px; height:calc(100vh - 53px); overflow-y:auto;
    }
    .nav-btn {
      display:flex; align-items:center; gap:10px; width:100%; padding:10px 20px;
      font-size:13px; color:var(--text2); transition:all .15s; border-left:3px solid transparent;
    }
    .nav-btn:hover { background:var(--bg3); color:var(--text); }
    .nav-btn.active { color:var(--accent); border-left-color:var(--accent); background:hsla(155,50%,30%,.08); }
    .nav-btn ion-icon { font-size:18px; }

    /* Content area */
    .admin-content { flex:1; padding:24px; max-width:900px; }
    .section { display:none; }
    .section.active { display:block; animation:fadeIn .3s; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .section-title { font-size:20px; margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid var(--accent); }

    /* Buttons */
    .btn {
      display:inline-flex; align-items:center; gap:6px; padding:10px 18px;
      border-radius:var(--radius); font-size:13px; font-weight:600; transition:all .2s;
    }
    .btn-primary { background:var(--accent); color:var(--bg); }
    .btn-primary:hover { background:var(--accent2); transform:translateY(-1px); }
    .btn-danger { background:transparent; color:var(--danger); border:1px solid var(--danger); }
    .btn-danger:hover { background:var(--danger); color:#fff; }
    .btn-ghost { color:var(--text2); border:1px solid var(--border); }
    .btn-ghost:hover { border-color:var(--text); color:var(--text); }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn-bar { display:flex; gap:8px; margin-bottom:20px; }

    /* Item list */
    .item-list { display:flex; flex-direction:column; gap:8px; }
    .item-card {
      background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
      padding:14px 16px; display:flex; justify-content:space-between; align-items:center;
      transition:border-color .2s;
    }
    .item-card:hover { border-color:var(--accent); }
    .item-card-body { flex:1; min-width:0; }
    .item-card-title { font-size:14px; font-weight:600; margin-bottom:2px; }
    .item-card-sub { font-size:12px; color:var(--text2); font-family:var(--mono); }
    .item-card-actions { display:flex; gap:6px; flex-shrink:0; }

    /* Modal */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:50;
      display:none; justify-content:center; align-items:flex-start; padding:60px 20px; overflow-y:auto;
    }
    .modal-overlay.active { display:flex; }
    .modal-box {
      background:var(--bg2); border:1px solid var(--border); border-radius:16px;
      padding:28px; width:100%; max-width:560px;
    }
    .modal-box h2 { font-size:18px; margin-bottom:20px; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }

    /* Toast */
    .toast {
      position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:var(--radius);
      font-size:13px; font-weight:500; z-index:100; transform:translateY(20px); opacity:0;
      transition:all .3s;
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast-success { background:var(--accent); color:var(--bg); }
    .toast-error { background:var(--danger); color:#fff; }

    /* Nested roles */
    .roles-area { margin-top:10px; padding-left:20px; border-left:2px solid var(--border); }
    .roles-area .item-card { background:var(--bg); }

    /* Image preview */
    .img-preview { width:60px; height:60px; border-radius:8px; object-fit:cover; border:1px solid var(--border); }
    .file-row { display:flex; align-items:center; gap:12px; }

    /* Form grid */
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:600px) {
      .admin-nav { display:none; }
      .form-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h1>🔧 Portfolio Admin</h1>
    <p>Sign in to manage your portfolio content</p>
    <div class="field"><label>Username</label><input id="l-user" type="text" placeholder="admin" /></div>
    <div class="field"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••" /></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="login()">Sign In</button>
    <div class="error" id="l-err"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="panel">
  <header class="panel-header">
    <h1>&lt;<span>YM</span>/&gt; Admin</h1>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </header>
  <div class="panel-body">
    <nav class="admin-nav" id="nav"></nav>
    <main class="admin-content" id="content"></main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modal-box"></div>
</div>

<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script>
const API = "/api";
let TOKEN = localStorage.getItem("admin_token");

// ─── Sections Config ───
const SECTIONS = {
  profile: { title:"Profile & About", icon:"person-outline", custom:true },
  contacts: { title:"Contacts", icon:"call-outline",
    fields: [
      { key:"type", label:"Type", type:"text", ph:"Email / Phone / Location" },
      { key:"value", label:"Value", type:"text", ph:"mesfiny711@gmail.com" },
      { key:"icon", label:"Ion-icon", type:"text", ph:"mail-outline" },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => `<strong>${i.type}</strong>: ${i.value}`
  },
  social_links: { title:"Social Links", icon:"share-social-outline",
    fields: [
      { key:"platform", label:"Platform", type:"text", ph:"LinkedIn" },
      { key:"url", label:"URL", type:"text", ph:"https://..." },
      { key:"icon", label:"Icon", type:"text", ph:"logo-linkedin" },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => `<strong>${i.platform}</strong> — ${i.url}`
  },
  typing_texts: { title:"Typing Texts", icon:"text-outline",
    fields: [
      { key:"text", label:"Text", type:"text", ph:"QA Automation Lead" },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => i.text
  },
  stats: { title:"Impact Metrics", icon:"speedometer-outline",
    fields: [
      { key:"label", label:"Label", type:"text", ph:"Testing Time Reduced" },
      { key:"value", label:"Value", type:"number", ph:"40" },
      { key:"suffix", label:"Suffix", type:"text", ph:"%" },
      { key:"icon", label:"Icon", type:"text", ph:"speedometer-outline" },
      { key:"reveal", label:"Reveal", type:"select", options:["left","right","bottom"] },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => `<strong>${i.value}${i.suffix||""}</strong> ${i.label}`
  },
  services: { title:"Services", icon:"construct-outline",
    fields: [
      { key:"title", label:"Title", type:"text" },
      { key:"description", label:"Description", type:"textarea" },
      { key:"icon", label:"Icon", type:"text", ph:"code-slash-outline" },
      { key:"reveal", label:"Reveal", type:"select", options:["left","right"] },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => `<strong>${i.title}</strong>`
  },
  tech_stack: { title:"Tech Stack", icon:"hardware-chip-outline",
    fields: [
      { key:"name", label:"Name", type:"text", ph:"Python" },
      { key:"icon", label:"Icon", type:"text", ph:"logo-python" },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => i.name
  },
  experience: { title:"Experience", icon:"briefcase-outline", custom:true },
  education: { title:"Education", icon:"school-outline", custom:true },
  skills: { title:"Skill Bars", icon:"bar-chart-outline",
    fields: [
      { key:"name", label:"Skill Name", type:"text" },
      { key:"percentage", label:"Percentage", type:"number", ph:"90" },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => `<strong>${i.name}</strong> — ${i.percentage}%`
  },
  projects: { title:"Portfolio", icon:"images-outline",
    fields: [
      { key:"title", label:"Title", type:"text" },
      { key:"category", label:"Category", type:"text", ph:"fintech / automation / telecom / web apps" },
      { key:"image_url", label:"Image", type:"image" },
      { key:"description", label:"Category Label", type:"text", ph:"FinTech — Company" },
      { key:"link", label:"Link", type:"text", ph:"#" },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => `<strong>${i.title}</strong> <span style="color:var(--text2)">[${i.category}]</span>`
  },
  certificates: { title:"Certificates", icon:"ribbon-outline",
    fields: [
      { key:"title", label:"Title", type:"text" },
      { key:"issuer", label:"Issuer", type:"text" },
      { key:"credential_id", label:"Credential ID", type:"text" },
      { key:"issue_date", label:"Issue Date", type:"text", ph:"January 2025" },
      { key:"expiry", label:"Expiry", type:"text", ph:"No Expiration" },
      { key:"verify_url", label:"Verify URL", type:"text", ph:"https://..." },
      { key:"status", label:"Status", type:"select", options:["Verified","ALUMNI","Pending"] },
      { key:"icon", label:"Icon", type:"text", ph:"ribbon-outline" },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => `<strong>${i.title}</strong> — ${i.issuer}`
  },
  testimonials: { title:"Testimonials", icon:"chatbubbles-outline",
    fields: [
      { key:"name", label:"Name", type:"text" },
      { key:"avatar_url", label:"Avatar", type:"image" },
      { key:"text", label:"Testimonial", type:"textarea" },
      { key:"sort_order", label:"Order", type:"number", ph:"1" },
    ],
    display: i => `<strong>${i.name}</strong>`
  },
  settings: { title:"Settings", icon:"settings-outline", custom:true },
};

// ─── API Helpers ───
async function api(endpoint, method = "GET", body = null) {
  const opts = { method, headers: { "Authorization": `Bearer ${TOKEN}` } };
  if (body && !(body instanceof FormData)) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  } else if (body) {
    opts.body = body;
  }
  const res = await fetch(API + endpoint, opts);
  if (res.status === 401) { logout(); throw new Error("Unauthorized"); }
  return res.json();
}

// ─── Auth ───
async function login() {
  const u = document.getElementById("l-user").value;
  const p = document.getElementById("l-pass").value;
  try {
    const data = await fetch(API + "/auth/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: p })
    }).then(r => r.json());
    if (data.token) {
      TOKEN = data.token;
      localStorage.setItem("admin_token", TOKEN);
      showPanel();
    } else {
      document.getElementById("l-err").textContent = data.error || "Login failed";
    }
  } catch { document.getElementById("l-err").textContent = "Connection failed"; }
}

function logout() {
  TOKEN = null;
  localStorage.removeItem("admin_token");
  document.getElementById("panel").style.display = "none";
  document.getElementById("login").style.display = "flex";
}

function showPanel() {
  document.getElementById("login").style.display = "none";
  document.getElementById("panel").style.display = "block";
  buildNav();
  switchTab(Object.keys(SECTIONS)[0]);
}

// ─── Toast ───
function toast(msg, type = "success") {
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.classList.add("show"), 10);
  setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 300); }, 3000);
}

// ─── Navigation ───
function buildNav() {
  document.getElementById("nav").innerHTML = Object.entries(SECTIONS)
    .map(([k, s]) => `<button class="nav-btn" data-tab="${k}"><ion-icon name="${s.icon}"></ion-icon>${s.title}</button>`)
    .join("");
  document.querySelectorAll(".nav-btn").forEach(b =>
    b.addEventListener("click", () => switchTab(b.dataset.tab))
  );
}

let currentTab = "";
async function switchTab(key) {
  currentTab = key;
  document.querySelectorAll(".nav-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === key)
  );
  const el = document.getElementById("content");
  const sec = SECTIONS[key];
  if (sec.custom) {
    if (key === "profile") await renderProfile(el);
    else if (key === "experience") await renderCompanies(el, "experience");
    else if (key === "education") await renderCompanies(el, "education");
    else if (key === "settings") renderSettings(el);
  } else {
    await renderCrudSection(el, key);
  }
}

// ─── Generic CRUD Section ───
async function renderCrudSection(el, key) {
  const sec = SECTIONS[key];
  const items = await api(`/${key}`);
  el.innerHTML = `
    <h2 class="section-title">${sec.title}</h2>
    <div class="btn-bar"><button class="btn btn-primary" id="add-btn">+ Add New</button></div>
    <div class="item-list" id="items-list">
      ${items.map(i => `
        <div class="item-card" data-id="${i.id}">
          <div class="item-card-body">
            <div class="item-card-title">${sec.display(i)}</div>
            <div class="item-card-sub">#${i.id} · Order: ${i.sort_order||0}</div>
          </div>
          <div class="item-card-actions">
            <button class="btn btn-ghost btn-sm edit-btn">Edit</button>
            <button class="btn btn-danger btn-sm del-btn">Delete</button>
          </div>
        </div>
      `).join("")}
    </div>`;
  document.getElementById("add-btn").onclick = () => openForm(key);
  el.querySelectorAll(".edit-btn").forEach(b => {
    b.onclick = () => openForm(key, items.find(i => i.id === +b.closest("[data-id]").dataset.id));
  });
  el.querySelectorAll(".del-btn").forEach(b => {
    b.onclick = async () => {
      if (!confirm("Delete this item?")) return;
      await api(`/${key}/${b.closest("[data-id]").dataset.id}`, "DELETE");
      toast("Deleted"); switchTab(key);
    };
  });
}

// ─── Form Modal ───
function openForm(key, item = null) {
  const sec = SECTIONS[key];
  const modal = document.getElementById("modal");
  const box = document.getElementById("modal-box");
  box.innerHTML = `
    <h2>${item ? "Edit" : "Add"} ${sec.title.replace(/s$/, "")}</h2>
    <form id="edit-form">
      ${sec.fields.map(f => `
        <div class="field">
          <label>${f.label}</label>
          ${f.type === "textarea"
            ? `<textarea name="${f.key}" placeholder="${f.ph||""}">${item?.[f.key]||""}</textarea>`
            : f.type === "select"
            ? `<select name="${f.key}">${f.options.map(o => `<option value="${o}" ${item?.[f.key]===o?"selected":""}>${o}</option>`).join("")}</select>`
            : f.type === "image"
            ? `<div class="file-row">
                ${item?.[f.key] ? `<img src="${item[f.key]}" class="img-preview" />` : ""}
                <input type="file" accept="image/*" name="${f.key}_file" />
                <input type="hidden" name="${f.key}" value="${item?.[f.key]||""}" />
               </div>`
            : `<input type="${f.type}" name="${f.key}" value="${item?.[f.key]??"" }" placeholder="${f.ph||""}" />`
          }
        </div>
      `).join("")}
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">${item ? "Save" : "Create"}</button>
      </div>
    </form>`;
  modal.classList.add("active");

  // Image upload handler
  box.querySelectorAll('input[type="file"]').forEach(input => {
    input.onchange = async () => {
      if (!input.files[0]) return;
      const fd = new FormData(); fd.append("image", input.files[0]);
      const data = await api("/upload", "POST", fd);
      const hidden = input.parentElement.querySelector('input[type="hidden"]');
      hidden.value = data.url;
      let preview = input.parentElement.querySelector(".img-preview");
      if (!preview) { preview = document.createElement("img"); preview.className = "img-preview"; input.parentElement.prepend(preview); }
      preview.src = data.url;
      toast("Image uploaded");
    };
  });

  document.getElementById("edit-form").onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {};
    sec.fields.forEach(f => {
      if (f.type === "image") body[f.key] = fd.get(f.key);
      else if (f.type === "number") body[f.key] = +fd.get(f.key) || 0;
      else body[f.key] = fd.get(f.key);
    });
    if (item) await api(`/${key}/${item.id}`, "PUT", body);
    else await api(`/${key}`, "POST", body);
    closeModal();
    toast(item ? "Updated!" : "Created!");
    switchTab(key);
  };
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
}
document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ─── Profile (custom) ───
async function renderProfile(el) {
  const p = await api("/profile");
  el.innerHTML = `
    <h2 class="section-title">Profile & About</h2>
    <form id="profile-form">
      <div class="form-row">
        <div class="field"><label>Full Name</label><input name="name" value="${p.name||""}" /></div>
        <div class="field"><label>Title</label><input name="title" value="${p.title||""}" /></div>
      </div>
      <div class="field">
        <label>Avatar</label>
        <div class="file-row">
          <img src="${p.avatar_url}" class="img-preview" id="avatar-preview" />
          <input type="file" accept="image/*" id="avatar-file" />
          <input type="hidden" name="avatar_url" value="${p.avatar_url||""}" />
        </div>
      </div>
      <div class="field">
        <label>About Text (use **text** for highlights, blank line for paragraphs)</label>
        <textarea name="about_text" style="min-height:160px">${p.about_text||""}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">Save Profile</button>
    </form>`;

  document.getElementById("avatar-file").onchange = async function() {
    if (!this.files[0]) return;
    const fd = new FormData(); fd.append("image", this.files[0]);
    const data = await api("/upload", "POST", fd);
    document.querySelector('[name="avatar_url"]').value = data.url;
    document.getElementById("avatar-preview").src = data.url;
    toast("Avatar uploaded");
  };

  document.getElementById("profile-form").onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    await api("/profile", "PUT", {
      name: fd.get("name"), title: fd.get("title"),
      about_text: fd.get("about_text"), avatar_url: fd.get("avatar_url")
    });
    toast("Profile saved!");
  };
}

// ─── Experience / Education (custom — nested companies → roles) ───
async function renderCompanies(el, section) {
  const companies = (await api("/companies")).filter(c => c.section === section);
  const allRoles = await api("/roles");
  const title = section === "education" ? "Education" : "Experience";
  const companyFields = [
    { key:"name", label:"Company / School", type:"text" },
    { key:"meta", label:"Duration / Location", type:"text" },
    { key:"icon", label:"Icon", type:"text", ph:"business-outline" },
    { key:"is_single", label:"Single Entry (dashed line)", type:"select", options:["0","1"] },
    { key:"sort_order", label:"Order", type:"number" },
  ];
  const roleFields = [
    { key:"title", label:"Role Title", type:"text" },
    { key:"date_range", label:"Date Range", type:"text" },
    { key:"description", label:"Description", type:"textarea" },
    { key:"tags", label:"Tags (comma-separated)", type:"text" },
    { key:"sort_order", label:"Order", type:"number" },
  ];

  el.innerHTML = `
    <h2 class="section-title">${title}</h2>
    <div class="btn-bar"><button class="btn btn-primary" id="add-company">+ Add ${section==="education"?"School":"Company"}</button></div>
    <div class="item-list">
      ${companies.map(c => {
        const roles = allRoles.filter(r => r.company_id === c.id);
        return `
          <div class="item-card" style="flex-direction:column;align-items:stretch" data-id="${c.id}">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div class="item-card-body">
                <div class="item-card-title">${c.name}</div>
                <div class="item-card-sub">${c.meta||""}</div>
              </div>
              <div class="item-card-actions">
                <button class="btn btn-ghost btn-sm edit-co">Edit</button>
                <button class="btn btn-danger btn-sm del-co">Delete</button>
              </div>
            </div>
            <div class="roles-area">
              ${roles.map(r => `
                <div class="item-card" data-rid="${r.id}" style="margin-top:6px">
                  <div class="item-card-body">
                    <div class="item-card-title" style="font-size:13px">${r.title}</div>
                    <div class="item-card-sub">${r.date_range||""}</div>
                  </div>
                  <div class="item-card-actions">
                    <button class="btn btn-ghost btn-sm edit-role">Edit</button>
                    <button class="btn btn-danger btn-sm del-role">Delete</button>
                  </div>
                </div>
              `).join("")}
              <button class="btn btn-ghost btn-sm" style="margin-top:8px" data-coid="${c.id}" data-add-role>+ Add Role</button>
            </div>
          </div>`;
      }).join("")}
    </div>`;

  // Company CRUD
  document.getElementById("add-company").onclick = () => {
    openCustomForm(title, companyFields, null, async body => {
      body.section = section;
      await api("/companies", "POST", body);
      toast("Added!"); switchTab(section);
    });
  };
  el.querySelectorAll(".edit-co").forEach(b => {
    b.onclick = () => {
      const c = companies.find(x => x.id === +b.closest("[data-id]").dataset.id);
      openCustomForm("Edit " + title, companyFields, c, async body => {
        body.section = section;
        await api(`/companies/${c.id}`, "PUT", body);
        toast("Updated!"); switchTab(section);
      });
    };
  });
  el.querySelectorAll(".del-co").forEach(b => {
    b.onclick = async () => {
      if (!confirm("Delete this and all its roles?")) return;
      await api(`/companies/${b.closest("[data-id]").dataset.id}`, "DELETE");
      toast("Deleted"); switchTab(section);
    };
  });

  // Role CRUD
  el.querySelectorAll("[data-add-role]").forEach(b => {
    b.onclick = () => {
      openCustomForm("Add Role", roleFields, null, async body => {
        body.company_id = +b.dataset.coid;
        body.tags = JSON.stringify(body.tags ? body.tags.split(",").map(t=>t.trim()) : []);
        await api("/roles", "POST", body);
        toast("Role added!"); switchTab(section);
      });
    };
  });
  el.querySelectorAll(".edit-role").forEach(b => {
    b.onclick = () => {
      const r = allRoles.find(x => x.id === +b.closest("[data-rid]").dataset.rid);
      const editR = {...r, tags: JSON.parse(r.tags||"[]").join(", ")};
      openCustomForm("Edit Role", roleFields, editR, async body => {
        body.company_id = r.company_id;
        body.tags = JSON.stringify(body.tags ? body.tags.split(",").map(t=>t.trim()) : []);
        await api(`/roles/${r.id}`, "PUT", body);
        toast("Updated!"); switchTab(section);
      });
    };
  });
  el.querySelectorAll(".del-role").forEach(b => {
    b.onclick = async () => {
      if (!confirm("Delete role?")) return;
      await api(`/roles/${b.closest("[data-rid]").dataset.rid}`, "DELETE");
      toast("Deleted"); switchTab(section);
    };
  });
}

function openCustomForm(title, fields, item, onSubmit) {
  const modal = document.getElementById("modal");
  const box = document.getElementById("modal-box");
  box.innerHTML = `
    <h2>${title}</h2>
    <form id="custom-form">
      ${fields.map(f => `
        <div class="field">
          <label>${f.label}</label>
          ${f.type === "textarea"
            ? `<textarea name="${f.key}" placeholder="${f.ph||""}">${item?.[f.key]||""}</textarea>`
            : f.type === "select"
            ? `<select name="${f.key}">${f.options.map(o=>`<option value="${o}" ${String(item?.[f.key])===o?"selected":""}>${o}</option>`).join("")}</select>`
            : `<input type="${f.type}" name="${f.key}" value="${item?.[f.key]??""}" placeholder="${f.ph||""}" />`}
        </div>
      `).join("")}
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">${item?"Save":"Create"}</button>
      </div>
    </form>`;
  modal.classList.add("active");
  document.getElementById("custom-form").onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {};
    fields.forEach(f => {
      body[f.key] = f.type === "number" ? +fd.get(f.key) || 0 : fd.get(f.key);
    });
    await onSubmit(body);
    closeModal();
  };
}

// ─── Settings (change password) ───
function renderSettings(el) {
  el.innerHTML = `
    <h2 class="section-title">Settings</h2>
    <h3 style="margin-bottom:14px">Change Password</h3>
    <form id="pw-form" style="max-width:400px">
      <div class="field"><label>Current Password</label><input type="password" name="current" /></div>
      <div class="field"><label>New Password</label><input type="password" name="newPassword" /></div>
      <button type="submit" class="btn btn-primary">Update Password</button>
    </form>`;
  document.getElementById("pw-form").onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await api("/auth/change-password", "POST", {
        current: fd.get("current"), newPassword: fd.get("newPassword")
      });
      toast("Password changed!"); e.target.reset();
    } catch { toast("Failed to change password", "error"); }
  };
}

// ─── Init ───
if (TOKEN) {
  api("/profile").then(() => showPanel()).catch(() => logout());
} else {
  document.getElementById("login").style.display = "flex";
}
</script>
