[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"

# API routes go to the function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Ensure admin.html is accessible
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200